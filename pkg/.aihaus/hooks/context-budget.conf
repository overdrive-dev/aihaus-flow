# context-budget.conf — per-cohort token budget defaults (M016-S06)
# Shipped with package. User override via .aihaus/.context-budgets sidecar
# (user-owned, never committed, survives /aih-update per ADR-M009-A).
#
# Format: cohort=<tokens>   (tokens = approximate word-pieces; chars/4 heuristic)
# Unknown cohort → fallback to doer default (2500).
#
# PRD §8 locked matrix — ADR-M016-A cites verbatim:
planner-binding=4000
planner=3000
doer=2500
verifier=1500
adversarial-scout=3000
adversarial-review=3000
