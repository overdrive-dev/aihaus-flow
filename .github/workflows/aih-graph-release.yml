name: aih-graph release

on:
  push:
    tags:
      - 'aih-graph-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    defaults:
      run:
        working-directory: aih-graph
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: aih-graph/go.sum
      - name: build release binary
        run: |
          mkdir -p dist
          BINARY="aih-graph-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#aih-graph-}" \
            -o "dist/${BINARY}" ./cmd/aih-graph
          (cd dist && sha256sum "${BINARY}" > "${BINARY}.sha256")
      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            aih-graph/dist/aih-graph-*
          generate_release_notes: true
